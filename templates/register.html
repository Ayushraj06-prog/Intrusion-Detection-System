<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDS Registration</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <h1><span class="shield">🛡️</span> Create Account</h1>
            <p>Register to monitor the network dashboard.</p>
            
            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}
            
            <form action="/register" method="POST">
                <div class="form-group">
                    <label for="username">Choose Username</label>
                    <input type="text" id="username" name="username" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="password">Create Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Register Account</button>
            </form>
            <div style="margin-top: 1.5rem; color: #94a3b8; font-size: 0.9rem; text-align: center;">
                Already have an account? <a href="/login" style="color: var(--accent); text-decoration: none; font-weight: bold;">Log In</a>
            </div>
        </div>
    </div>
</body>
</html>
